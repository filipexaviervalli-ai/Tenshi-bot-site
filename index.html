<!DOCTYPE html>
<html>

<head>

<title>Tenshi Bot</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1e1e2f,#2a0f4f,#1e1e2f);
background-size:400% 400%;
animation:bg 12s infinite;
color:white;
text-align:center;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
padding:60px 20px;
}

.avatar{
width:140px;
border-radius:50%;
box-shadow:0 0 25px #a855f7;
}

h1{
font-size:48px;
color:#c084fc;
margin-top:20px;
}

p{
font-size:18px;
opacity:0.9;
}

button{
margin-top:20px;
background:#a855f7;
border:none;
padding:18px 40px;
font-size:20px;
color:white;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#9333ea;
transform:scale(1.05);
}

.section{
margin-top:60px;
background:rgba(0,0,0,0.25);
padding:30px;
border-radius:20px;
max-width:700px;
margin-left:auto;
margin-right:auto;
}

.commands{
font-family:monospace;
line-height:2;
}

footer{
margin-top:60px;
opacity:0.7;
}

</style>

</head>

<body>

<div class="container">

<img class="avatar" src="https://cdn.discordapp.com/embed/avatars/0.png">

<h1>Tenshi</h1>

<p>Um bot inteligente de Discord criado por Dzzn.</p>

<a href="https://discord.com/oauth2/authorize?client_id=1480267754379542680&permissions=8&scope=bot">

<button>Adicionar ao Discord</button>

</a>

</div>

<div class="section">

<h2>Comandos</h2>

<div class="commands">

!userinfo<br>
!avatar<br>
!serverinfo<br>
!rank<br>
!botinfo<br>
!credits<br>
!invite<br>
!ping

</div>

</div>

<div class="section">

<h2>Sobre</h2>

<p>
Tenshi é um bot inteligente que conversa com usuários,
possui sistema de níveis e vários comandos úteis.
</p>

</div>

<footer>

<p>Criado por Dzzn</p>

</footer>

</body>
</html>
